<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" class="bg"/>
  <text
    x="16"
    y="17"
    text-anchor="middle"
    class="c-letter"
    font-family="Arial, Helvetica, sans-serif"
    font-size="17"
    font-weight="900"
  >C</text>
  <text
    x="16"
    y="27"
    text-anchor="middle"
    class="dev-text"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10"
